# SUPABASE PROJECT CONFIGURATION
# Being MBCT App - Subscription Management
#
# Supabase CLI v2 schema. Project ref is passed via --project-ref on link
# (no [project] section needed). Per-function blocks define verify_jwt;
# the bare [functions] section is no longer required.

# DATABASE CONFIGURATION
[db]
port = 54322
major_version = 17

# API CONFIGURATION
[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

# EDGE FUNCTIONS CONFIGURATION
# Per-function verify_jwt settings below. v2 dropped the umbrella
# `[functions] enabled = true` toggle.

# Verify Apple Receipt Function
# User-initiated from the mobile app during a purchase flow. Requires the
# user's Supabase JWT so the verified receipt can be tied to auth.uid().
# The function itself talks to Apple's receipt-verification endpoint with
# the shared secret -- the JWT gate is for caller identity, not Apple auth.
[functions.verify-apple-receipt]
verify_jwt = true

# Verify Google Receipt Function
# Same pattern as Apple -- user-initiated, must tie receipt to auth.uid().
[functions.verify-google-receipt]
verify_jwt = true

# Subscription Webhook Handler
# Apple/Google call this directly; they don't carry a Supabase JWT. The
# function verifies their own signatures (Apple JWS via verifyAppleJWS.ts,
# Google Pub/Sub OIDC via verifyGoogleOIDC.ts) before mutating state.
[functions.subscription-webhook]
verify_jwt = false

# Grace Period Automation (Cron Job)
[functions.grace-period-automation]
verify_jwt = false

# CRON JOB CONFIGURATION
#
# TODO: re-schedule grace-period-automation in v2. The CLI v2 dropped the
# inline [[functions.X.schedule]] block. Two paths:
#   1) Create a pg_cron migration that schedules `net.http_post` against
#      the function's endpoint with the X-Cron-Secret header.
#   2) Set up via Supabase Dashboard -> Database -> Cron.
#
# Until one of those lands, the daily 2 AM UTC run will not fire.
# Original intent preserved here for reference:
#   schedule = "0 2 * * *"   (every day at 2:00 AM UTC)
#   payload  = { "source": "cron" }

# AUTH CONFIGURATION
[auth]
enabled = true
site_url = "exp://localhost:8081"  # Expo development URL
additional_redirect_urls = ["exp://being.app"]

# Anonymous sign-in enabled (no email/password required)
[auth.email]
enable_signup = false

[auth.external.apple]
enabled = true
client_id = "env(APPLE_CLIENT_ID)"
secret = "env(APPLE_SECRET)"

# STORAGE CONFIGURATION
[storage]
enabled = true
file_size_limit = "10MB"  # Encrypted backup limit

# REALTIME CONFIGURATION
[realtime]
enabled = false  # Not needed for this app

# ENVIRONMENT VARIABLES
# Note: Set these in Supabase dashboard or via CLI
# Required for Apple receipt verification:
# - APPLE_SHARED_SECRET
#
# Required for Google receipt verification:
# - GOOGLE_SERVICE_ACCOUNT (JSON string)
#
# Required for cron job:
# - CRON_SECRET
#
# Required for all functions:
# - SUPABASE_URL
# - SUPABASE_SERVICE_ROLE_KEY
