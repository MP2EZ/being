name: CI

on:
  push:
    branches: [main, development, 'feat/*', 'fix/*', 'chore/*', 'refactor/*', 'hotfix/*']
  pull_request:
    branches: [main, development]
    types: [opened, synchronize, reopened]
  schedule:
    # Daily health check — verifies the suite still passes against current
    # branches even with no new commits. Hourly was overkill for pre-launch.
    - cron: '0 9 * * *'

env:
  NODE_VERSION: '20'
  # The app's package.json depends on @mp2ez/being-design-system (private
  # GitHub Packages release). The app/.npmrc references ${GITHUB_TOKEN}
  # which we surface from the workflow's automatic token here. Read-only
  # `packages: read` permission is sufficient for `npm ci`.
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# Default token permissions. `packages: read` lets npm ci pull from
# GitHub Packages without an explicit per-step env or PAT.
permissions:
  contents: read
  packages: read

# Cancel in-progress runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Single install. Subsequent jobs restore from cache rather than running
  # npm ci each time (9 jobs × 1-2 min install = 10+ min wasted in the old
  # workflow).
  prepare:
    name: Install dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'app/package-lock.json'

      - name: Install dependencies
        run: |
          cd app
          npm ci --prefer-offline --no-audit

  # Static analysis — fast, runs in parallel with tests below.
  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: prepare

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'app/package-lock.json'

      - name: Install dependencies
        run: cd app && npm ci --prefer-offline --no-audit

      - name: Typecheck
        run: cd app && npm run typecheck

  # ESLint job gates on the per-file baseline ratchet (W4 paydown).
  # The codebase carries ~955 errors of accumulated debt from 5+ months
  # of unguarded dev. Rather than blocking PRs on all of them, the
  # `lint:baseline` script compares each file's current error count to
  # the snapshot in app/.eslint-baseline.json. New errors fail; existing
  # errors don't. Improvements are reported and can be ratcheted in via
  # `npm run lint:baseline -- --update`.
  lint:
    name: ESLint (baseline ratchet)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: prepare

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'app/package-lock.json'

      - name: Install dependencies
        run: cd app && npm ci --prefer-offline --no-audit

      - name: Lint (baseline ratchet)
        run: cd app && npm run lint:baseline

  # Crisis-authority validation — runs first among the test jobs because a
  # crisis-flow regression is the highest-severity failure. Gates the rest.
  crisis-validation:
    name: Crisis authority validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: prepare

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'app/package-lock.json'

      - name: Install dependencies
        run: cd app && npm ci --prefer-offline --no-audit

      - name: Crisis authority validation
        run: cd app && npm run validate:crisis-authority

  # Clinical accuracy — PHQ-9 / GAD-7 / Stoic content validation.
  # Decoupled from crisis-validation: the original `needs: crisis-validation`
  # dependency was aspirational (crisis-first gating), but clinical and
  # crisis test suites are independent and clinical should run regardless
  # of crisis's status. With both as parallel siblings of `prepare`, a
  # broken crisis script no longer hides clinical-suite regressions.
  clinical-validation:
    name: Clinical authority validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: prepare

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'app/package-lock.json'

      - name: Install dependencies
        run: cd app && npm ci --prefer-offline --no-audit

      - name: Clinical authority validation
        run: cd app && npm run validate:clinical-authority

  # Full unit + integration test suite — catches the regression tests added
  # in Phase 0 (CollapsibleCrisisButton.a11y.test.ts and
  # AuthenticationService.sec03.test.ts) via Jest auto-discovery.
  #
  # Gating: as of the W1 debt paydown, broken-import failures are fixed and
  # the running suites enforce. 5 integration tests are temporarily ignored
  # via testPathIgnorePatterns in jest.config.js (see TODO comments there)
  # pending separate fixes for SecureStorageService singleton timers,
  # MaskedView native mock, and assessment-store API drift.
  test:
    name: Unit + integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: prepare

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'app/package-lock.json'

      - name: Install dependencies
        run: cd app && npm ci --prefer-offline --no-audit

      - name: Unit tests
        # --coverage intentionally omitted: this is a SUBSET run (jest
        # --testPathPattern=unit) so per-file coverage would always fall
        # below the global thresholds in jest.config.js (those are sized
        # for the full suite). Coverage enforcement belongs in a
        # dedicated full-suite job; subset runs validate their slice.
        run: cd app && npm run test:unit -- --ci --testTimeout=20000

      - name: Integration tests
        run: cd app && npm run test:integration -- --ci --testTimeout=30000

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/coverage/
          retention-days: 14

  # Security + compliance — encryption, HIPAA-adjacent checks, dependency
  # audit. npm audit threshold is `high` (not `moderate`) until the
  # 5-month-old lockfile is refreshed — see audit-roadmap.md Phase 0/3 for
  # the planned dependency refresh.
  security:
    name: Security + compliance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: prepare

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'app/package-lock.json'

      - name: Install dependencies
        run: cd app && npm ci --prefer-offline --no-audit

      - name: Legal docs registry drift check
        # Verifies docs/legal/*.md filenames match the require() calls and
        # LegalDocumentType registry in app/src/features/profile/content/
        # legalDocuments.ts. The app statically requires every legal doc via
        # Metro; drift breaks the bundle silently. CI does not run Metro,
        # so this guard is the only structural protection against the bug
        # class. See scripts/legal-registry.js for the comparison rules.
        run: node scripts/legal-registry.js

      - name: Service-singleton setInterval guard check
        # INFRA-177: Verifies every setInterval call in service files is
        # guarded by `process.env.NODE_ENV === 'test'` (either at the call
        # site or at the calling method). Prevents the bug class that
        # required INFRA-144 (2 services) and INFRA-175 (5 services) fixes
        # — unguarded singleton init timers leak into Jest's event loop
        # and hang CI at the 15-min wall. Escape hatch via
        # `// interval-guard-skip: <reason>` comment for stress-test or
        # other self-clearing patterns.
        run: node scripts/check-service-interval-guards.js

      - name: Compliance authority validation
        run: cd app && npm run validate:compliance-authority

      - name: Encryption test suite
        # --coverage omitted on subset runs (see Unit tests rationale).
        run: cd app && npm run test:encryption -- --ci

      - name: Security test suite
        # --coverage omitted on subset runs (see Unit tests rationale).
        run: cd app && npm run test:security -- --ci --testTimeout=15000

      - name: npm audit
        # MAINT-182: switched from raw `npm audit --audit-level=high` to
        # `audit-ci` with an explicit allowlist at app/.audit-ci.json.
        # Three transitive CVEs in @expo/config-plugins@56.0.8 are
        # allowlisted (GHSA-ph9p-34f9-6g65 tmp path traversal,
        # GHSA-6vfc-qv3f-vr6c markdown-it ReDoS, GHSA-w5hq-g745-h8pq
        # uuid bounds check) — all build-time only, no patched stable
        # version available. Threshold is `moderate` (tightened from the
        # prior `high`) since the allowlist gives precise control.
        # Drop the GHSAs from .audit-ci.json when @expo/config-plugins
        # >=56.0.9 ships as stable.
        #
        # Historical context (kept for archaeology): the W3 paydown's
        # `npm audit fix` cleared 11 high+critical vulns (xmldom,
        # brace-expansion, fast-uri, flatted, handlebars, lodash,
        # minimatch, node-forge, picomatch, tar, undici) via lockfile
        # updates only. The remaining moderate floor was the Expo
        # transitive chain; threshold was raised to `high` as an interim
        # measure pending the Expo upgrade. audit-ci with an explicit
        # allowlist replaces that interim.
        run: cd app && npx audit-ci --config .audit-ci.json

  # Accessibility — WCAG AA validation + a11y test suite. Strict gate
  # as of Phase B+C paydown. Root causes addressed:
  #   - Global Jest mocks for react-native-reanimated and gesture-handler
  #     (both blocked component rendering with TurboModule errors).
  #   - RadioGroup structural a11y (Phase A: accessibilityRole moved to
  #     outer testID-bearing View; Boolean(isDisabled); preventDefault?.()).
  #   - CollapsibleCrisisButton testID propagation (now reaches the
  #     interactive Pressable, not just its -icon child).
  #   - Crisis button label updated to "I need support" (per crisis
  #     specialist guidance — first-person agency, gentler for repeated
  #     screen-reader exposure).
  # 45/45 accessibility tests pass.
  accessibility:
    name: Accessibility (WCAG AA)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: prepare

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'app/package-lock.json'

      - name: Install dependencies
        run: cd app && npm ci --prefer-offline --no-audit

      - name: Accessibility validation
        run: cd app && npm run validate:accessibility

      - name: Accessibility test suite
        run: cd app && npm run test:accessibility -- --ci --testTimeout=20000

  # Performance regression sweep. Strict gate as of Phase A paydown.
  # Root causes fixed:
  #   - Zustand snapshot-staleness pattern in assessment-performance
  #     (was caching getState() once; now refreshed on each read).
  #   - assessment-store API drift (primaryTrigger vs triggerType).
  #   - SecureStorageService cleanup setInterval kept Jest alive past
  #     completion — now skipped in NODE_ENV=test.
  #   - CI threshold variance recalibrated; production budgets still
  #     enforced via perf:crisis/perf:breathing/perf:launch scripts.
  # Deferred (testPathIgnorePatterns in jest.config.js):
  #   - sync-performance-validation + week3-analytics-performance:
  #     tests reference older service APIs (new SyncCoordinator() when
  #     it's a singleton, .shutdown() removed, crypto/auth mock shapes
  #     changed). Need rewrite, not patching.
  performance:
    name: Performance regression
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: prepare

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'app/package-lock.json'

      - name: Install dependencies
        run: cd app && npm ci --prefer-offline --no-audit

      - name: Performance test suite
        run: cd app && npm run test:performance -- --ci --testTimeout=30000

  # T17 (TEST-10): Deno-based tests for Supabase Edge Functions. Closes
  # the audit's largest unprotected security surface — webhook JWS chain
  # validation, Google OIDC verification, replay protection, and
  # constant-time auth comparison. Runs independently of the Node suite
  # (different runtime). Required for ci-pass.
  edge-functions:
    name: Edge Functions (Deno)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # No `needs: prepare` because Deno doesn't share Node's npm cache.
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x
      - name: Edge Functions test suite
        run: cd supabase/functions && deno task test

  # Aggregate gate. Required jobs must pass; perf and lint can be
  # advisory if needed. Keeps PR review surface tight.
  ci-pass:
    name: CI pass
    runs-on: ubuntu-latest
    if: always()
    needs:
      - typecheck
      - lint
      - crisis-validation
      - clinical-validation
      - test
      - security
      - accessibility
      - performance
      - edge-functions

    steps:
      - name: Aggregate gate status
        run: |
          echo "typecheck:        ${{ needs.typecheck.result }}"
          echo "lint:             ${{ needs.lint.result }}"
          echo "crisis:           ${{ needs.crisis-validation.result }}"
          echo "clinical:         ${{ needs.clinical-validation.result }}"
          echo "test:             ${{ needs.test.result }}"
          echo "security:         ${{ needs.security.result }}"
          echo "performance:      ${{ needs.performance.result }}"
          echo "accessibility:    ${{ needs.accessibility.result }}"
          echo "edge-functions:   ${{ needs.edge-functions.result }}"
          # All 9 jobs are strict gates after T17 (TEST-10) added the
          # Edge Functions Deno suite.
          # Advisory list: (empty)
          #
          # Real gates that must pass:
          #   typecheck, lint (baseline ratchet), crisis-validation,
          #   clinical-validation, security, test, performance, accessibility,
          #   edge-functions
          if [[ "${{ needs.typecheck.result }}" != "success" \
             || "${{ needs.lint.result }}" != "success" \
             || "${{ needs.crisis-validation.result }}" != "success" \
             || "${{ needs.clinical-validation.result }}" != "success" \
             || "${{ needs.security.result }}" != "success" \
             || "${{ needs.test.result }}" != "success" \
             || "${{ needs.performance.result }}" != "success" \
             || "${{ needs.accessibility.result }}" != "success" \
             || "${{ needs.edge-functions.result }}" != "success" ]]; then
            echo "❌ One or more required gates failed"
            exit 1
          fi
          echo "✅ All required gates passed (advisory jobs may show non-success — see logs)"
