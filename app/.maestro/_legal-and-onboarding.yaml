appId: com.being.app
tags:
  - helper
name: "Helper: traverse LegalGate + Onboarding"
---
# Reusable subflow. Called via `- runFlow: _legal-and-onboarding.yaml`
# from each top-level safety flow after a fresh launchApp { clearState: true }.
#
# Goal: get the app from the cold-start LegalGate to the main tab navigator
# as fast as possible, without driving any safety surface.
#
# This subflow exists because the LegalGate (age picker + 4 consent toggles)
# and Onboarding (5 sub-screens) are non-safety UI ceremony that would
# otherwise dominate flow runtime and brittleness. Safety surfaces (crisis
# detection, threshold alerts, 988 dial) are tested by the calling flows.

# ── Step 1: LegalGate ────────────────────────────────────────────
# Age verification picker (iOS native wheel). Tap to focus, then tap a
# year that satisfies >=18 (any year up to current_year - 19 is safe).
- tapOn:
    accessibilityLabel: "Select your birth year"
- tapOn:
    text: "1995"
    optional: true # picker may already show 1995; this tap is best-effort

# Four consent checkboxes — matched via unique substring of their label text.
- tapOn:
    text: "I agree to the Terms of Service"
- tapOn:
    text: "I agree to the Privacy Policy"
- tapOn:
    text: "I understand Being provides wellness support"
- tapOn:
    text: "I explicitly consent to Being processing"

# Continue
- tapOn:
    id: "legal-gate-continue"

# ── Step 2: Onboarding ────────────────────────────────────────────
# Onboarding is a 5-screen flow (welcome → stoicIntro → notifications →
# privacy → celebration). The Explore App button on the celebration
# screen routes straight to Main tabs without setting up morning practice.
#
# Each intermediate screen has a primary CTA (commonly labelled "Continue"
# or "Next" — exact copy may vary). We use Maestro's text+optional pattern
# to tolerate copy drift while making progress.
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Next"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- tapOn:
    text: "Next"
    optional: true
- tapOn:
    text: "Continue"
    optional: true

# Final screen — Explore App routes to Main tabs.
- tapOn:
    id: "onboarding-explore-app"

# ── Step 3: Verify we landed on Main ─────────────────────────────
- assertVisible:
    text: "Home" # bottom tab label
