appId: com.being.app
tags:
  - helper
name: "Helper: traverse LegalGate + Onboarding"
---
# Reusable subflow. Called via `- runFlow: _legal-and-onboarding.yaml`
# from each top-level safety flow after a fresh
# launchApp { clearState: true, clearKeychain: true }.
#
# Goal: get the app from the cold-start LegalGate to the main tab navigator
# as fast as possible, without driving any safety surface.
#
# This subflow exists because the LegalGate (age picker + 4 consent toggles)
# and Onboarding (5 sub-screens) are non-safety UI ceremony that would
# otherwise dominate flow runtime and brittleness. Safety surfaces (crisis
# detection, threshold alerts, 988 dial) are tested by the calling flows.
#
# INFRA-181: the prior dev-menu tutorial dismiss step (tapOn text "Continue"
# optional) was non-deterministic — sometimes opening a secondary dev-tools
# panel that bounced the app back to the Expo dev launcher. App.tsx now
# calls DevMenu.closeMenu() on mount when EXPO_PUBLIC_E2E_SUPPRESS_DEV_MENU=1
# (set in .env.development), so the tutorial is dismissed JS-side before
# Maestro polls the view hierarchy. No flow-level dismiss needed.

# ── Step 0: Expo dev launcher → load Being app ──────────────────
# In dev builds, launchApp lands in the Expo dev-client launcher with a
# "DEVELOPMENT SERVERS" list. Tap the Metro server entry to load the
# JS bundle. In release builds these steps are no-ops (optional: true).
# Dismiss any "Open in 'Being'?" system prompt first.
- tapOn:
    text: "Open"
    optional: true
# Wait briefly for the dev launcher to populate its server list.
- extendedWaitUntil:
    visible:
      text: "DEVELOPMENT SERVERS"
    timeout: 15000
    optional: true
# Tap the Metro server row by location (50% x, ~20% y) since text-based
# selectors on the dev launcher are unreliable. The row is fixed in the
# layout — first item under DEVELOPMENT SERVERS header.
- tapOn:
    point: "50%, 20%"
    optional: true
# LegalGate readiness signal. Use the testID added in INFRA-179
# (legal-dob-picker on CombinedLegalGateScreen.tsx:247) — testID is more
# deterministic than text and survives copy drift. App.tsx's dev-menu
# suppression (INFRA-181) runs before Maestro reaches this poll, so no
# tutorial-dismiss step is needed.
- extendedWaitUntil:
    visible:
      id: "legal-dob-picker"
    timeout: 30000

# ── Step 1: LegalGate — date-of-birth picker (INFRA-179, INFRA-181) ─
# @react-native-picker/picker renders inline UIPickerView on iOS. Wheel
# items aren't tappable as text in the accessibility tree, so swiping is
# the only option. Years are sorted descending (newest first) — see
# CombinedLegalGateScreen.tsx:69 `currentYear - i`. Placeholder (value=null)
# at index 0. The specific year doesn't matter as long as it's ≥18.
#
# INFRA-181: swipe coords must START AND END INSIDE the picker's y-range
# (currently ~25%–48% of screen height — see bounds in hierarchy dump).
# Earlier coords started at 70% (below the picker) so the parent ScrollView
# claimed the gesture and the wheel never scrolled. Use the picker's id as
# the swipe anchor so coords don't drift with layout changes.
- tapOn:
    id: "legal-dob-picker"
- swipe:
    from:
      id: "legal-dob-picker"
    direction: UP
- swipe:
    from:
      id: "legal-dob-picker"
    direction: UP
- swipe:
    from:
      id: "legal-dob-picker"
    direction: UP
- swipe:
    from:
      id: "legal-dob-picker"
    direction: UP
- swipe:
    from:
      id: "legal-dob-picker"
    direction: UP
# Regression guard: fail fast if the wheel didn't actually scroll
# (placeholder still visible = no year selected, Continue would stay
# disabled and the downstream `assertVisible: text "Home"` failure
# would take ~90s to surface).
- assertNotVisible:
    text: "Select year..."

# Four consent checkboxes via testID. testIDs sit on the 24px indicator View,
# NOT the outer Pressable (INFRA-181): the Pressable's bounding-box center
# falls in the text region, where the inline `Linking.openURL` link substring
# (e.g. "Terms of Service") would intercept the tap and navigate away.
# Tapping the small indicator forces the touch into a link-free zone — the
# parent Pressable still receives the event via RN tap propagation.
- tapOn:
    id: "legal-consent-tos"
- tapOn:
    id: "legal-consent-privacy"
- tapOn:
    id: "legal-consent-wellness"
- tapOn:
    id: "legal-consent-mh-processing"

# Continue. INFRA-181: Continue button sits below the consents; on smaller
# screens it's offscreen until scrolled. scrollUntilVisible is more durable
# than blind swipes — adapts to layout shifts across SDK upgrades.
- scrollUntilVisible:
    element:
      id: "legal-gate-continue"
    direction: DOWN
- tapOn:
    id: "legal-gate-continue"

# ── Step 2: Onboarding ────────────────────────────────────────────
# Onboarding sequence (per OnboardingScreen.navigateNext):
#   1. Welcome           → "Begin Your Practice"  → opens PHQ-9 modal
#   2. PHQ-9 (9 questions, modal) → onComplete → GAD-7 modal
#   3. GAD-7 (7 questions, modal) → onComplete → Stoic Intro
#   4. Stoic Intro       → "Continue"
#   5. Notifications     → "Continue" (or "Set up later" — both navigateNext)
#   6. Privacy           → "Continue"
#   7. Celebration       → "Explore App" (testID="onboarding-explore-app")
#
# KNOWN LIMITATION (INFRA-183): the helper currently stops at the PHQ-9
# introduction modal that opens when "Begin Your Practice" is tapped.
# Traversing the in-onboarding PHQ-9 + GAD-7 assessments (16 questions,
# answer + auto-advance pattern) is the next blocker. For now this helper
# only validates LegalGate traversal works; downstream safety flows that
# depend on reaching Main (e.g. crisis-button reachability, 988 dial) will
# still fail at this point until INFRA-183 lands.
- tapOn:
    text: "Begin Your Practice"
    optional: true

# Final screen — Explore App routes to Main tabs.
- tapOn:
    id: "onboarding-explore-app"

# ── Step 3: Verify we landed on Main ─────────────────────────────
- assertVisible:
    text: "Home" # bottom tab label
