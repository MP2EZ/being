appId: com.being.app
tags:
  - safety-device-only
name: "988 dial does not surface 'Unable to Call' fallback (device-only)"
---
# DEVICE-ONLY (INFRA-184). Cannot pass on iOS simulator: the sim's
# Linking.canOpenURL('tel:988') returns false unconditionally because the
# simulator has no phone app — independent of LSApplicationQueriesSchemes.
# Run only against a real iPhone:
#   npm run e2e:safety:988-dial
# The `safety-device-only` tag excludes this flow from `npm run e2e:safety`
# (which uses --include-tags=safety) so the sim suite stays passable.
#
# PRIMARY pin for the LSApplicationQueriesSchemes contract is the jest test
# at app/__tests__/safety/lsApplicationQueriesSchemes.config.test.ts. That
# test runs in `npm run precommit` on every commit on every machine — it
# catches a regression before a build is even produced. This flow is the
# SUPPLEMENTARY device-only check that the runtime dial path still behaves
# correctly when canOpenURL returns true (which only happens on real iOS).
#
# Contract pinned: with `tel` in app.json's LSApplicationQueriesSchemes,
# tapping the 988 button on a device hands off to the iOS dialer; no
# in-app "Unable to Call" fallback alert appears. Absence of the alert is
# what this flow asserts (Maestro cannot observe the iOS dialer once the
# app backgrounds, but it can observe the absence of the in-app fallback).

- launchApp:
    clearState: true
    clearKeychain: true # SecureStore-backed consent persists across clearState — wipe keychain too (INFRA-179)
- runFlow: _legal-and-onboarding.yaml

# Reach CrisisResources from Home tab. INFRA-183: tab-home testID is the
# mechanically reliable selector — Maestro's `text:` doesn't match the
# bottom-tab `accessibilityText: "Home, tab, 1 of 4"` (text field is empty).
- tapOn:
    id: "tab-home"
- tapOn:
    id: "crisis-home"
- assertVisible:
    id: "crisis-resources-screen"

# Tap the 988 Call Now button. With tel: in LSApplicationQueriesSchemes,
# Linking.openURL('tel:988') succeeds → iOS dial prompt; no in-app alert.
# Without it, canOpenURL returns false → fallback alert appears.
- tapOn:
    id: "crisis-call-988-button"

# Poll for fallback-alert ABSENCE over 3s. extendedWaitUntil is required
# because the openURL → canOpenURL race resolves async; an immediate
# assertNotVisible could pass before the alert had a chance to render.
- extendedWaitUntil:
    notVisible: "Unable to Call"
    timeout: 3000
