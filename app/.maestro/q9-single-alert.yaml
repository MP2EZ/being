appId: com.being.app
tags:
  - safety
name: "PHQ-9 Q9 single canonical alert"
---
# Pins MAINT-166 PR 1: PHQ-9 Q9 response >0 fires exactly one canonical
# alert with three correct buttons. The old mockCrisisEngine alert
# ("View Resources" / "Call 988 Now") must NOT appear — that mismatch
# is what shipped the double-alert bug.
#
# Canonical alert (from assessmentStore.triggerEmergencyResponse):
#   Title:   "🚨 Crisis Support Available"
#   Button1: "Call 988 (Crisis Lifeline)"
#   Button2: "Text 741741 (Crisis Text)"
#   Button3: "Emergency 911"

- launchApp:
    clearState: true
    clearKeychain: true # SecureStore-backed consent persists across clearState — wipe keychain too (INFRA-179)
- runFlow: _legal-and-onboarding.yaml

# Navigate to Profile → PHQ-9 entry point. INFRA-186: the PHQ-9 card sits
# below the fold on iPhone 16 Plus (its bounds extend past screen height),
# and Maestro's center-of-bounds tap on the unsacrolled card lands at
# (215, 917) — exactly inside the Insights tab button (x=216-323, y=857-924).
# That silently switches tabs to Insights (which is FeatureGate-paywalled)
# instead of navigating to AssessmentFlow. scrollUntilVisible brings the
# card into view so the tap lands inside its visible region.
- tapOn:
    id: "tab-profile"
- scrollUntilVisible:
    element:
      id: "take-phq9-button"
    direction: DOWN
- tapOn:
    id: "take-phq9-button"
# Intro screen scrolls — Begin button sits below the fold.
- scrollUntilVisible:
    element:
      id: "assessment-begin-button"
    direction: DOWN
- tapOn:
    id: "assessment-begin-button"

# Q1–Q8: "Not at all" (option 0 = score 0).
# Auto-advance: each answer tap triggers handleAnswer which advances.
- repeat:
    times: 8
    commands:
      - tapOn:
          id: "assessment-response-group-option-0"

# Q9 (self-harm): "Several days" (option 1, score 1, >0).
# This is the trigger — assessmentStore.checkQ9Crisis fires the canonical
# alert in response.
- tapOn:
    id: "assessment-response-group-option-1"

# Pin the canonical contract via the in-page banner that AssessmentResults
# renders alongside the iOS Alert. DEBUG-187 verified the canonical alert
# fires from the store (assessmentStore.ts:326-347 — "🚨 Crisis Support
# Available" + 3 canonical buttons) — visible empirically via screenshot
# review, source verified, and Jest-guarded by AssessmentResults.test.tsx's
# "no Alert/Linking bypass" describe block. Maestro v2.6's `text:` selector
# does NOT match iOS UIAlertController accessibilityText — the alert renders
# correctly but its title/body/buttons are inaccessible to assertVisible.
# Tracked as a follow-up; for now we pin the in-page banner (RN view tree,
# fully Maestro-visible) which renders on every crisis result (PHQ-9 Q9,
# PHQ-9 ≥20, GAD-7 ≥15). If that banner stays visible, AssessmentResults
# mounted cleanly and the store's single-writer alert path was reached.
- extendedWaitUntil:
    visible:
      id: "results-crisis-banner"
    timeout: 10000
