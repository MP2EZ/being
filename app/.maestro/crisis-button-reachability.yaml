appId: com.being.app
tags:
  - safety
name: "Crisis button reaches CrisisResources from every tab"
---
# Pins the safety fact: 988 access <3 taps from any screen. Asserts that
# the crisis button on each of the 4 main tabs successfully navigates
# to CrisisResources. Replaces the dormant Detox crisis-access.e2e.ts.
#
# Maestro's default assertVisible timeout (~10s) covers the <3s SLA from
# CLAUDE.md. The jest-side `perf:crisis` script was removed in MAINT-166
# PR 7 (it ran zero matching tests); on-device timing budgets live in
# CLAUDE.md's "Performance Budgets" section and are validated by hand
# until a real perf harness exists.

- launchApp:
    clearState: true
    clearKeychain: true # SecureStore-backed consent persists across clearState — wipe keychain too (INFRA-179)
- runFlow: _legal-and-onboarding.yaml

# Tabs are addressed via tabBarTestID (INFRA-183, CleanTabNavigator.tsx) —
# Maestro's text: selector doesn't match the bottom-tab accessibilityText
# "X, tab, N of 4" patterns because the text field itself is empty.

# ── Home tab ─────────────────────────────────────────────────────
- tapOn:
    id: "tab-home"
- tapOn:
    id: "crisis-home"
- assertVisible:
    id: "crisis-resources-screen"
# INFRA-185: pop the CrisisResources modal via the explicit nav-back-button
# testID added to CleanRootNavigator's HeaderBackButton override. Maestro's
# `- back` action on iOS 18.6 sim reports COMPLETED but doesn't actually
# pop modal-presentation stack screens; left-edge swipe doesn't honor them
# either. Tapping the testID-tagged back button is the mechanically
# reliable route.
- tapOn:
    id: "nav-back-button"

# ── Learn tab ────────────────────────────────────────────────────
- tapOn:
    id: "tab-learn"
- tapOn:
    id: "crisis-learn"
- assertVisible:
    id: "crisis-resources-screen"
# INFRA-185: pop the CrisisResources modal via the explicit nav-back-button
# testID added to CleanRootNavigator's HeaderBackButton override. Maestro's
# `- back` action on iOS 18.6 sim reports COMPLETED but doesn't actually
# pop modal-presentation stack screens; left-edge swipe doesn't honor them
# either. Tapping the testID-tagged back button is the mechanically
# reliable route.
- tapOn:
    id: "nav-back-button"

# ── Insights tab ─────────────────────────────────────────────────
# DEBUG-189: re-enabled. The FeatureGate wrapper around InsightsScreen was
# removed (CleanTabNavigator.tsx) — it was incidental FEAT-16-deferral debris,
# not an intentional v1 paywall. CollapsibleCrisisButton (testID="crisis-insights")
# now renders unconditionally on this tab like the other three.
- tapOn:
    id: "tab-insights"
- tapOn:
    id: "crisis-insights"
- assertVisible:
    id: "crisis-resources-screen"
- tapOn:
    id: "nav-back-button"

# ── Profile tab ──────────────────────────────────────────────────
- tapOn:
    id: "tab-profile"
- tapOn:
    id: "crisis-profile"
- assertVisible:
    id: "crisis-resources-screen"
